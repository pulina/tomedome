name: Release

on:
  push:
    tags:
      - "*"

permissions:
  contents: write

jobs:
  build-windows:
    runs-on: windows-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: "22"
          cache: npm

      - run: npm ci
      - run: npm run build
      - run: npx electron-builder --win --x64 --publish never

      - uses: actions/upload-artifact@v4
        with:
          name: tomedome-windows
          path: release/*.exe
          if-no-files-found: error

  build-mac-arm64:
    runs-on: macos-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: "22"
          cache: npm

      - run: npm ci
      - run: npm run build
      - run: npx electron-builder --mac --arm64 --publish never

      - uses: actions/upload-artifact@v4
        with:
          name: tomedome-mac-arm64
          path: release/*.dmg
          if-no-files-found: error

  build-mac-x64:
    runs-on: macos-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: "22"
          cache: npm

      - run: npm ci
      - run: npm run build
      - run: npx electron-builder --mac --x64 --publish never

      - uses: actions/upload-artifact@v4
        with:
          name: tomedome-mac-x64
          path: release/*.dmg
          if-no-files-found: error

  build-linux:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Install packaging deps (deb/rpm)
        run: |
          sudo apt-get update
          sudo apt-get install -y --no-install-recommends fakeroot rpm

      - uses: actions/setup-node@v4
        with:
          node-version: "22"
          cache: npm

      - run: npm ci
      - run: npm run build
      - run: npx electron-builder --linux deb rpm --x64 --publish never

      - uses: actions/upload-artifact@v4
        with:
          name: tomedome-linux
          path: |
            release/*.deb
            release/*.rpm
          if-no-files-found: error

  github-release:
    needs: [build-windows, build-mac-arm64, build-mac-x64, build-linux]
    runs-on: ubuntu-latest
    steps:
      - uses: actions/download-artifact@v4
        with:
          path: assets
          merge-multiple: true

      - uses: softprops/action-gh-release@v2
        with:
          draft: false
          generate_release_notes: true
          files: |
            assets/*
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
